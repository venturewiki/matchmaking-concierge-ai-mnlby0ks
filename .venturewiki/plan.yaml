  tagline: Premium AI-powered dating concierge for NYC professionals — psychology meets automation
  mission: 'Occupy the unoccupied middle market: AI-native and psychologist-backed dating concierge at $500-$2,000/month, far cheaper than traditional luxury matchmakers ($10K-$500K+) but with genuine human expertise that pure AI services lack.'
  vision: 'Become the #1 AI-powered premium dating concierge in major US metros, expanding from NYC to Boston, DC, and SF, combining deep psychology with agentic AI to make meaningful connections accessible to professionals.'
