problemSolution:
  corePainPoint: 'Modern dating in NYC has two unsatisfactory extremes: dating apps are cheap but emotionally exhausting and ineffective (71% report burnout), while traditional matchmakers are effective but prohibitively expensive ($10K-$500K+). There is no middle ground offering genuine human expertise with AI efficiency.'
  painDimensions:
    who: NYC professionals aged 28-55, income $80K-$200K+, dating-app fatigued and relationship-seeking
    frequency: Daily — 10+ hours/week spent on apps; 90% of matches never lead to real dates
    currentWorkarounds: Tinder/Hinge/Bumble (free but exhausting), or premium matchmakers like Janis Spindel ($25K-$1M) that are inaccessible
    costOfProblem: Emotional toll of ghosting, rejection, and wasted time; delayed life milestones; missed meaningful connections
    urgencyLevel: High — NYC dating app fatigue at record levels, 71% report burnout
  solutionOneLiner: An AI-powered dating concierge that combines six specialized AI agents with a licensed psychologist to manage your entire dating pipeline — from profile optimization to date booking — via WhatsApp/SMS, at 1/10th the cost of traditional matchmakers.
  features:
    - feature: ProfileAgent
      benefit: Optimizes dating app profiles (copy + photos) for maximum matches
      techLayer: GPT-4o + Vision API
    - feature: ScreeningAgent
      benefit: Analyzes potential matches for compatibility + red flags
      techLayer: LLM + Attachment Theory scoring
    - feature: ConversationAgent
      benefit: Drafts personalized first messages (human reviews before send)
      techLayer: GPT-4o with human-in-the-loop
    - feature: SchedulingAgent
      benefit: Negotiates date times via WhatsApp; syncs with Google Calendar
      techLayer: Twilio + Google Calendar API
    - feature: VenueAgent
      benefit: Recommends and books NYC restaurants via Resy/OpenTable
      techLayer: Resy API + OpenTable API
    - feature: CoachAgent
      benefit: Pre-date briefing and post-date feedback collection
      techLayer: LLM + Psychologist oversight
  unfairAdvantage: Unique psychologist + AI architect founding combination. Licensed psychologist provides attachment-theory-based compatibility scoring that no pure-AI service can match. OpenClaw proprietary agentic orchestration layer. Zero-VC model means decisions driven by clients, not investors. Ready-made referral pipeline from psychologist's 10-year NYC therapy/coaching network.
  market:
    tam: All paid dating services in NYC
    tamSize: $420M/yr
    tamSource: IBISWorld Dating Services 2025
    sam: Premium/concierge dating segment in NYC
    samSize: $85M/yr
    samSource: Competitor pricing analysis + NYC census data
    som: First 30 clients in Year 1
    somSize: $162K
    somSource: 'Bottom-up: 30 clients × average $450/mo × 12 months'
  whyNow: Dating app fatigue at record high (71% burnout). AI agent adoption going mainstream in 2026 normalizes AI-assisted communication. The $500-$2,000/mo price band is completely underserved with genuine tech + psychological depth. No one in NYC currently offers psychologist-backed compatibility scoring combined with end-to-end agentic AI pipeline management.
productGtm:
